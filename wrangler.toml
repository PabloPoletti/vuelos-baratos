name = "vuelos-baratos-api"
main = "src/index.ts"
compatibility_date = "2025-06-01"
account_id = "1fd499d2836bb7e6955d0986652d97f8"

[vars]
APP_ENV = "production"

# KV namespace for caching flight search results.
# Create it once with:  wrangler kv namespace create SEARCH_CACHE
# Then replace the placeholder below with the id printed by that command.
[[kv_namespaces]]
binding = "SEARCH_CACHE"
id = "REPLACE_WITH_NAMESPACE_ID"
